#This is some complex but useful vulnerability analysis and patching automation written in Ansible (primarily for public sector that runs RHEL, and a specific type of Nessus Scanner, if you know you know. There are a few dependencies. Need ansible-core 2.16 or later, need python 3.12 with requests module, need enough Memory on your controller to handle high forks and execution against however many hosts you have at once, theoretically you could run some stuff serial but we chose speed over procedural safety due to the updates being fairly low risk because we exclude the big hitters like kernel.

# ==============================================================================*
# PLAY 0/5: GATHER AND SET GLOBAL VARIABLES
# ==============================================================================*
- name: "Play 0/5: Gather Global Variables"
  hosts: localhost
  gather_facts: no
  tasks:
    - name: "Set hardcoded variables as facts for global access"
      set_fact:
        prompt_email_recipient:
          - "exampleemail1.example.com"
          - "exampleemail2.example.com"
          - "exampleemail3.example.com"
          - "exampleemail4.example.com"
        prompt_host_domain: "exampledomain.com"
        prompt_scanner_input: "examplenessusserver.exampledomain.com"

    - name: "TASK: Check if 'requests' library is installed on controller"
      ansible.builtin.command: "{{ ansible_playbook_python }} -c 'import requests'"
      register: requests_check
      failed_when: false
      changed_when: false

    - name: "TASK: Auto-install 'requests' library via pip if missing"
      ansible.builtin.pip:
        name: requests
        extra_args: "--user"
        executable: "{{ ansible_playbook_python }} -m pip"
      when: requests_check.rc != 0

# ==============================================================================*
# PLAY 1/5: GATHER VULNERABILITY DATA FROM SCANNER
# ==============================================================================*
- name: "Play 1/5: Query scanner for Vulnerabilities"
  hosts: all
  gather_facts: no
  tasks:
    - name: "TASK: Set FQDN and Query scanner"
      block:
        - name: "Sub-Task: Construct FQDN"
          set_fact:
            fqdn_target: "{{ inventory_hostname if '.' in inventory_hostname else inventory_hostname ~ '.' ~ hostvars['localhost'].prompt_host_domain }}"

### With the scanner you will get way too much data unless you specify a specific repository that only tracks vulns related to patching. In my case there is a vulnerability scan repository that specifically only includes plugins and cves related to software versions.
        - name: "Sub-Task: Query Scanner API"
          uri:
            url: "https://{{ hostvars['localhost'].prompt_scanner_input }}/rest/analysis"
            method: POST
            headers:
              x-apikey: "accesskey={{ scanner_automation_access_key }}; secretkey={{ scanner_automation_secret }};"
            body_format: json
            body:
              type: "vuln"
              sourceType: "cumulative"
              query:
                tool: "vulndetails"
                type: "vuln"
                startOffset: 0
                endOffset: 500
                filters:
                  - { filterName: "repositoryIDs", operator: "=", value: "3" }
                  - { filterName: "dnsName", operator: "=", value: "{{ fqdn_target }}" }
                  - { filterName: "severity", operator: "=", value: "4,3,2" }
            validate_certs: no
            return_content: yes
          register: scanner_response_raw
          delegate_to: localhost

        - name: "Sub-Task: Create structured list of vulnerabilities"
          set_fact:
            vulnerability_list: "{{ _parsed_vulns_json | from_json }}"
          vars:
            _parsed_vulns_json: >-
              {% set results = [] %}
              {% for item in scanner_response_raw.json.response.results | default([]) %}
                {% set text = item.pluginText | default('') %}
                {% set rpm_pairs = text | regex_findall('Remote package installed\\s*:\\s*(\\S+)[\\s\\S]*?Should be\\s*:\\s*(\\S+)') %}
                {% set fs = item.firstSeen | default(0) | int %}
                {% set pp = item.patchPubDate | default(0) | int %}
                {% for pair in rpm_pairs %}
                  {% set _ = results.append({
                    'vuln_name': item.pluginName | default('Unknown'),
                    'plugin_id': item.pluginID | default('Unknown'),
                    'severity': item.severity.name | default('Unknown'),
                    'first_seen': ('%Y-%m-%d' | strftime(fs)) if fs > 0 else 'Unknown',
                    'patch_pub': ('%Y-%m-%d' | strftime(pp)) if pp > 0 else 'Unknown',
                    'affected_version': pair[0],
                    'fix_version': pair[1],
                    'base_pkg': pair[0] | regex_replace('-[0-9]+.*$', ''),
                    'host': inventory_hostname
                  }) %}
                {% endfor %}
              {% endfor %}
              {{ results | to_json }}
          when: scanner_response_raw.json.response.results is defined

# ==============================================================================*
# PLAY 1.5/5: HOST INFRASTRUCTURE PREPARATION
# ==============================================================================*
###The following tasks are related to environmental bugfixes specific to my datacenter. This product works better using a local privileged account for passing DNF commands so that each transaction isnt a 5 way transaction between the controller, destination host, ldap, back to destination host, back to controller, then delivering payload to destination. For that we found our standardized local privileged account has various settings across the environment. Little things like banner responses or expiry timer responses when logging in breaks the automation, so I disable them for this account.

- name: "Play 1.5/5: Host Infrastructure Preparation"
  hosts: all
  gather_facts: no
  become: yes
  tasks:
    - name: "TASK: Reset pam_faillock counter for local_admin"
      ansible.builtin.command: "faillock --user local_admin --reset"
      register: faillock_reset_raw
      # Ignore failures if faillock binary is missing (e.g. older RHEL versions) 
      # or if become fails immediately due to an active lock.
      failed_when: false
      changed_when: false

    - name: "TASK: Check current account aging rules for local_admin"
      ansible.builtin.command: "chage -l local_admin"
      register: admin_chage_raw
      changed_when: false
      failed_when: false

    - name: "TASK: Configure local_admin aging and disable password expiration"
      ansible.builtin.user:
        name: "local_admin"
        password_expire_max: 99999
        password_expire_min: 0
      # Only runs if user exists; native user module handles max/min age idempotently
      when: admin_chage_raw.rc == 0

    - name: "TASK: Disable absolute account expiration and inactive lock for local_admin"
      ansible.builtin.command: "chage -I -1 -E -1 local_admin"
      # Only execute this command if the account or inactive lock is not already set to 'never'
      when:
        - admin_chage_raw.rc == 0
        - >
          ('Account expires' in admin_chage_raw.stdout and 'never' not in admin_chage_raw.stdout) or
          ('Password inactive' in admin_chage_raw.stdout and 'never' not in admin_chage_raw.stdout)
      register: chage_unexpire_result
      changed_when: chage_unexpire_result.rc == 0

    - name: "TASK: Restore SELinux contexts on /home2, /root, and /var/log"
      ansible.builtin.command: "restorecon -Rv /home2 /root /var/log"
      register: restorecon_output
      # Smart check: only marks as changed if files were actually relabeled
      changed_when: "'Relabeled' in restorecon_output.stdout"
      failed_when: false

# ==============================================================================*
# PLAY 2/5: LOCAL DNF CHECKS
# ==============================================================================*
- name: "Play 2/5: Local DNF Checks"
  hosts: all
  gather_facts: no
  become: yes
  tasks:
    - name: "TASK: Force DNF Metadata Refresh"
      ansible.builtin.command: "dnf makecache"
      become: yes
      changed_when: false

    - name: "TASK: Execute Consolidated Sudo Checks (Bypasses Repeated PAM Hits)"
      shell: |
        echo "===START_UPGRADES==="
        dnf list upgrades --quiet || true
        echo "===START_INSTALLED==="
        dnf list installed --quiet || true
        echo "===START_IDENTITY==="
        subscription-manager identity || true
      register: local_checks_raw
      changed_when: false

    - name: "TASK: Parse and Rebuild Expected System Facts"
      set_fact:
        dnf_upgrades_result:
          stdout: "{{ (local_checks_raw.stdout.split('===START_UPGRADES===')[1].split('===START_INSTALLED===')[0]) | trim }}"
        dnf_installed_result:
          stdout: "{{ (local_checks_raw.stdout.split('===START_INSTALLED===')[1].split('===START_IDENTITY===')[0]) | trim }}"
        subman_identity:
          stdout: "{{ (local_checks_raw.stdout.split('===START_IDENTITY===')[1]) | trim }}"
          stdout_lines: "{{ (local_checks_raw.stdout.split('===START_IDENTITY===')[1] | trim).split('\n') }}"

# ==============================================================================*
# PLAY 3/5: CHECK SATELLITE FOR ALL UNIQUE PACKAGES
# ==============================================================================*
- name: "Play 3/5: Query Red Hat Satellite for Exact Packages"
  hosts: localhost
  connection: local
  gather_facts: no
  tasks:
    - name: "TASK: Aggregate unique fix versions safely"
      set_fact:
        master_vuln_list: "{{ groups['all'] | map('extract', hostvars, 'vulnerability_list') | select('defined') | list | flatten }}"
        
    - name: "TASK: Query Satellite API for package availability"
      uri:
        url: "https://examplerhsatserver.exampledomain.com/katello/api/packages?search=nvra={{ item.fix_version | urlencode }}"
        method: GET
        user: "{{ local_sat_user }}"
        password: "{{ local_sat_pass }}"
        force_basic_auth: yes
        validate_certs: no
        return_content: yes
        status_code: [200, 404]
      register: satellite_query_results
      until: satellite_query_results.status in [200, 404]
      retries: 5
      delay: 10
      loop: "{{ master_vuln_list | unique(attribute='fix_version') }}"
      loop_control:
        label: "{{ item.fix_version }}"
        pause: 0.1
        
    - name: "TASK: Build Satellite lookup table"
      set_fact:
        sat_lookup: "{{ sat_lookup | default({}) | combine({ item.item.fix_version: (item.json.total > 0) }) }}"
      loop: "{{ satellite_query_results.results }}"
      when: item.status == 200 and item.item is defined
      no_log: true

# ==============================================================================*
# PLAY 3.5/5: CONTENT VIEW PROMOTION FOR TARGET ENVIRONMENTS
# ==============================================================================*
- name: "Play 3.5/5: Promote Content Views for Target Environments"
  hosts: localhost
  connection: local
  gather_facts: no
  tasks:
    - name: "Initialize promotion variables"
      set_fact:
        inventory_cv_details: {}
        cv_promoted_hosts: []

    - name: "TASK: Identify unique CV/LE/Org pairs from all hosts in inventory"
      set_fact:
        inventory_cv_details: "{{ inventory_cv_details | combine({item: {'cv': cv_name, 'le': le_name, 'org': org_name}}, recursive=true) }}"
      loop: "{{ groups['all'] }}"
      vars:
        subman_lines: "{{ hostvars[item].subman_identity.stdout_lines | default([]) }}"
        
        env_line: "{{ subman_lines | select('search', 'environment name:') | first | default('') }}"
        raw_env: "{{ env_line.split(':', 1)[-1] | trim }}"
        le_name: "{{ raw_env.split('/')[0] | trim if '/' in raw_env else (raw_env | trim if raw_env != '' else 'Library') }}"
        cv_name: "{{ raw_env.split('/', 1)[-1] | trim if '/' in raw_env else (raw_env | trim if raw_env != '' else 'Unknown') }}"
        
        org_line: "{{ subman_lines | select('search', 'org name:') | first | default('') }}"
        org_name: "{{ org_line.split(':', 1)[-1] | trim if ':' in org_line else 'Unknown' }}"

    - name: "TASK: Check for deltas and build exact list of needed promotions"
      set_fact:
        cv_promotions_needed: "{{ _promotions_json | from_json }}"
      vars:
        _promotions_json: >-
          {% set promos = [] %}
          {% for host in groups['all'] %}
            {% set cv = inventory_cv_details[host].cv %}
            {% set le = inventory_cv_details[host].le %}
            {% set org = inventory_cv_details[host].org %}
            
            {% if le != 'Library' %}
              {% set ns = namespace(delta=false) %}
              {% for vuln in hostvars[host].vulnerability_list | default([]) %}
                {% set is_in_sat = hostvars['localhost'].sat_lookup[vuln.fix_version] | default(false) %}
                {% set dnf_out = hostvars[host].dnf_upgrades_result.stdout | default('') %}
                
                {% if is_in_sat and not (vuln.base_pkg in dnf_out) %}
                  {% set ns.delta = true %}
                {% endif %}
              {% endfor %}
              
              {% if ns.delta %}
                {% set promo = {'cv': cv, 'le': le, 'org': org} %}
                {% if promo not in promos %}
                  {% set _ = promos.append(promo) %}
                {% endif %}
              {% endif %}
            {% endif %}
          {% endfor %}
          {{ promos | to_json }}

    - name: "TASK: Publish and Promote Content View"
      redhat.satellite.content_view_version:
        server_url: "https://examplerhsatserver.exampledomain.com"
        username: "{{ local_sat_user }}"
        password: "{{ local_sat_pass }}"
        validate_certs: no
        organization: "{{ item.org }}"
        content_view: "{{ item.cv }}"
        lifecycle_environments:
          - "{{ item.le }}"
      loop: "{{ cv_promotions_needed }}"
      register: promotion_results
      when: cv_promotions_needed | length > 0

    - name: "TASK: Set flag for hosts whose CV was promoted"
      set_fact:
        cv_promoted_hosts: "{{ cv_promoted_hosts + [host.key] }}"
      loop: "{{ inventory_cv_details | dict2items }}"
      loop_control:
        loop_var: host
      vars:
        host_cv_le:
          cv: "{{ host.value.cv }}"
          le: "{{ host.value.le }}"
          org: "{{ host.value.org }}"
      when:
        - cv_promotions_needed | length > 0
        - host_cv_le in cv_promotions_needed

# ==============================================================================*
# PLAY 4/5: AUTO-REMEDIATION
# ==============================================================================*
- name: "Play 4/5: Targeted Remediation"
  hosts: all
  gather_facts: no
  become: yes
  vars:
    reboot_packages_regex: '^(kernel.*|glib2|glibc|dbus.*|systemd.*|linux-firmware)$'
  tasks:
    - name: "TASK: Pause for 2 minutes if a CV was promoted to allow clients to sync"
      ansible.builtin.pause:
        minutes: 1
        prompt: "A Content View was promoted. Waiting for 1 minute for client subscriptions to refresh..."
      when: inventory_hostname in (hostvars['localhost'].cv_promoted_hosts | default([]))

    - name: "TASK: Refresh DNF cache on clients whose CV was promoted"
      ansible.builtin.command: "dnf clean all && dnf makecache"
      when: inventory_hostname in (hostvars['localhost'].cv_promoted_hosts | default([]))
      changed_when: false
      register: dnf_refresh_result

    - name: "TASK: Re-check DNF for available upgrades after promotion and cache refresh"
      ansible.builtin.command: "dnf list upgrades --quiet"
      register: dnf_upgrades_recheck
      when: inventory_hostname in (hostvars['localhost'].cv_promoted_hosts | default([]))
      changed_when: false

    - name: "TASK: Identify safe packages for remediation"
      set_fact:
        remediation_targets: "{{ _targets_json | from_json }}"
      vars:
        _targets_json: >-
          {% set targets = [] %}
          {% set promoted = inventory_hostname in (hostvars['localhost'].cv_promoted_hosts | default([])) %}
          {# Use the re-checked DNF output if available, otherwise use the original from Play 2 #}
          {% set dnf_out = dnf_upgrades_recheck.stdout if promoted and dnf_upgrades_recheck is defined else dnf_upgrades_result.stdout %}
          
          {% for vuln in vulnerability_list | default([]) %}
            {% set is_reboot = vuln.base_pkg is regex(reboot_packages_regex) %}
            {% set is_in_sat = hostvars['localhost'].sat_lookup[vuln.fix_version] | default(false) %}
            {% set dnf_shows_available = vuln.base_pkg in dnf_out %}
            
            {% if not is_reboot and is_in_sat and dnf_shows_available %}
              {% if vuln.base_pkg not in targets %}{% set _ = targets.append(vuln.base_pkg) %}{% endif %}
            {% endif %}
          {% endfor %}
          {{ targets | unique | to_json }}

    - name: "TASK: Execute DNF Update for non-reboot packages"
      ansible.builtin.dnf:
        name: "{{ remediation_targets }}"
        state: latest
        skip_broken: yes
      when: remediation_targets | length > 0
      register: dnf_update_output

    - name: "TASK: Summary of remediated packages"
      debug:
        msg: "Remediated the following on {{ inventory_hostname }}: {{ remediation_targets | join(', ') }}"
      when: remediation_targets | length > 0 and dnf_update_output.changed

# ==============================================================================*
# PLAY 5/5: REPORT EXPORT AND DISTRIBUTION
# ==============================================================================*
- name: "Play 5/5: Report Export and Distribution"
  hosts: localhost
  gather_facts: no
  vars:
    # NOTE: If you want glibc to auto-patch, remove it from this regex in Plays 4 and 5
    reboot_packages_regex: '^(kernel.*|glib2|glibc|dbus.*|systemd.*|linux-firmware)$'
  tasks:
    - name: "TASK: Generate Dynamic CSV Filename"
      set_fact:
        csv_filename: "./scanner_vulnerability_report_{{ lookup('pipe', 'date +%Y%m%d_%H%M%S') }}.csv"
        
    - name: "TASK: Build Final Report Data with Remediation Status"
      set_fact:
        report_rows: "{{ _report_json | from_json }}"
      vars:
        _report_json: >-
          {% set res = [] %}
          {% for vuln in master_vuln_list %}
            {% set host = vuln['host'] %}
            {% set sat_status = hostvars['localhost'].sat_lookup[vuln['fix_version']] | default(false) %}
            {% set dnf_res = hostvars[host].dnf_upgrades_result | default({}) %}
            {% set dnf_out = dnf_res.stdout | default('') %}
            
            {% set cv_promoted_flag = "Yes" if (hostvars['localhost'].cv_promoted_hosts | default([]) | length > 0) else "No" %}
            {% set reboot_req = "Yes" if (vuln['base_pkg'] is regex(reboot_packages_regex)) else "No" %}
            
            {% set was_patched = 'No' %}
            {% if hostvars[host].dnf_update_output is defined and hostvars[host].dnf_update_output.changed %}
              {% if vuln['base_pkg'] in (hostvars[host].remediation_targets | default([])) %}
                {% set was_patched = 'Yes' %}
              {% endif %}
            {% endif %}
            
            {# Extract pure version string to check if it's already installed #}
            {% set fix_ver_stripped = vuln['fix_version'] | regex_replace('^' ~ vuln['base_pkg'] ~ '-', '') | regex_replace('\\.(x86_64|noarch|i686|aarch64)$', '') %}
            {% set dnf_installed_out = hostvars[host]['dnf_installed_result'].stdout | default('') %}
            {% set is_already_installed = (fix_ver_stripped in dnf_installed_out) %}
            
            {% set needs_rescan = 'Yes (Already Installed)' if (is_already_installed and was_patched == 'No') else 'No' %}
            
            {% set found = namespace(exists=false) %}
            {% for row in res %}
              {# UPDATED: Added host matching to prevent incorrect state flattening #}
              {% if row['id'] == vuln['plugin_id'] and row['fix'] == vuln['fix_version'] and host in row['scanner_hosts'] %}
                {% set found.exists = true %}
              {% endif %}
            {% endfor %}
            
            {% if not found.exists %}
              {% set item_dict = {
                'name': vuln['vuln_name'] | default('Unknown'),
                'id': vuln['plugin_id'] | default('Unknown'),
                'sev': vuln['severity'] | default('Unknown'),
                'first_seen': vuln['first_seen'] | default('Unknown'),
                'patch_pub': vuln['patch_pub'] | default('Unknown'),
                'aff': vuln['affected_version'] | default('Unknown'),
                'fix': vuln['fix_version'] | default('Unknown'),
                'sat': ('Yes' if sat_status else 'No'),
                'dnf': ('Yes' if (vuln['base_pkg'] in dnf_out) else 'No'),
                'cv_promoted': cv_promoted_flag,
                'reboot_req': reboot_req,
                'patched': was_patched,
                'needs_rescan': needs_rescan,
                'scanner_hosts': [host]
              } %}
              {% set ignored = res.append(item_dict) %}
            {% endif %}
          {% endfor %}
          {{ res | to_json }}
          
    - name: "TASK: Generate CSV File"
      copy:
        dest: "{{ csv_filename }}"
        content: |
          Vulnerability Name,Plugin ID,Severity,First Discovered,Patch Published,Affected Version,Fix Version,Satellite Available,DNF Available,CV Promoted,Reboot Required,Patched,Needs Rescan,Host
          {% for row in report_rows %}
          "{{ row.name }}",{{ row.id }},{{ row.sev }},"{{ row.first_seen }}","{{ row.patch_pub }}","{{ row.aff }}","{{ row.fix }}",{{ row.sat }},{{ row.dnf }},{{ row.cv_promoted }},{{ row.reboot_req }},{{ row.patched }},"{{ row.needs_rescan }}","{{ row.scanner_hosts | unique | sort | join(', ') }}"
          {% endfor %}
          
    - name: "TASK: Email CSV Report"
      mail:
        host: localhost
        port: 25
        from: "examplegroupemail.exampledomain.com"
        to: "{{ prompt_email_recipient | join(',') }}"
        subject: "Mission Report: scanner Vulnerability Remediation Tracking"
        body: |
          Attached is the vulnerability cross-reference report.
          - CV Promoted: Indicates if a Content View was promoted for the host's Lifecycle environment.
          - Reboot Required: Indicates if the vulnerability fix requires a system reboot to take effect.
          - Patched: Indicates if the playbook automatically applied the fix via DNF.
          - Needs Rescan: Indicates "Yes (Already Installed)" if scanner reported a vulnerability but DNF confirms the fixed version is already present on the system (indicating scanner data is stale).
        attach:
          - "{{ csv_filename }}"
      delegate_to: localhost

# ==============================================================================*
# PLAY 5.5/5: LAUNCH AD-HOC scanner RESCAN
# ==============================================================================*
###Scaner for api usage needs specific things. API token associated with an account with necessary permissions, must own all aspects of the scan it wants to interact with, so the scan itself, scan policy, and asset list if applicable, but I am using IP/DNS for targets instead.
- name: "Play 5.5/5: Mission - Ad-Hoc scanner Scan Launch"
  hosts: localhost
  connection: local
  gather_facts: no
  vars:
    # Ensure this matches your Tenable.sc configured Scan ID
    scanner_scan_id: "1432"
  tasks:
    - name: "TASK: Build comma-separated list of simple hostnames"
      set_fact:
        # Directly joins inventory hostnames without needing fact gathering
        scanner_target_list: "{{ groups['all'] | join(',') }}"

    - name: "TASK: Ensure we have targets to scan"
      fail:
        msg: "No targets found in the inventory to scan."
      when: scanner_target_list | length == 0

    - name: "TASK: Display targets to be updated"
      debug:
        msg: "Overwriting Scan ID {{ scanner_scan_id }} targets with: {{ scanner_target_list }}"

    - name: "TASK: Step 1 - Hard Overwrite scanner Scan Targets"
      uri:
        url: "https://{{ hostvars['localhost'].prompt_scanner_input }}/rest/scan/{{ scanner_scan_id }}"
        method: PATCH
        headers:
          x-apikey: "accesskey={{ scanner_automation_access_key }}; secretkey={{ scanner_automation_secret }};"
        body_format: json
        body:
          ipList: "{{ scanner_target_list }}"
        validate_certs: no
        status_code: 200
      register: scan_update_result

    - name: "TASK: Step 2 - Launch the updated scanner Scan"
      uri:
        url: "https://{{ hostvars['localhost'].prompt_scanner_input }}/rest/scan/{{ scanner_scan_id }}/launch"
        method: POST
        headers:
          x-apikey: "accesskey={{ scanner_automation_access_key }}; secretkey={{ scanner_automation_secret }};"
        body_format: json
        body: {}
        validate_certs: no
        return_content: yes
        status_code: 200
      register: scan_launch_result

    - name: "TASK: Display Scan Launch Confirmation"
      debug:
        msg: 
          - "Scan Name: {{ scan_update_result.json.response.name | default('N/A') }}"
          - "Status: Scan targets successfully overwritten and scan launched!"

